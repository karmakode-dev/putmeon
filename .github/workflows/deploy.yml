name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_USE_MOCK_API: false
          VITE_API_URL: https://ezfnycxrvhclxrdbzrxg.supabase.co/functions/v1/api
          VITE_APP_URL: https://putmeon.karmakode.co
          VITE_SUPABASE_URL: https://ezfnycxrvhclxrdbzrxg.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6Zm55Y3hydmhjbHhyZGJ6cnhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDQ3NjAsImV4cCI6MjA5NTgyMDc2MH0.MNc8mjXxpZILC3UTAFNoMv2-qs6TfpiIMMPt0zkQOWo

      - name: SPA fallback for client-side routing
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
